name: Python Package

on:
  pull_request:
    paths:
      - ".github/workflows/python-package.yml"
      - "python/**"
      - "src/rust/freestiler-core/**"
  push:
    branches:
      - main
    tags:
      - "python-v*"
    paths:
      - ".github/workflows/python-package.yml"
      - "python/**"
      - "src/rust/freestiler-core/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-rust-default:
    name: Rust Tests (default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run freestiler-core tests
        run: cargo test --manifest-path src/rust/freestiler-core/Cargo.toml

  test-rust-postgis:
    name: Rust Tests (postgis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run freestiler-core tests with postgis feature
        run: cargo test --manifest-path src/rust/freestiler-core/Cargo.toml --features postgis

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -e "python[test]"
          python -m pip install pyogrio
      - name: Run Python tests
        run: python -m pytest python/tests -q

  test-python-postgis-smoke:
    name: Python Tests (postgis smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin geopandas shapely pyproj numpy pytest
      - name: Build PostGIS-enabled wheel
        run: python -m maturin build --manifest-path python/Cargo.toml --features postgis --release --out dist
      - name: Install wheel
        run: python -m pip install dist/freestiler-*.whl
      - name: Run PostGIS smoke tests
        run: python -m pytest python/tests/test_postgis.py -q

  build-wheels:
    name: Build Wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
            interpreter: "/opt/python/cp39-cp39/bin/python"
          - os: ubuntu-latest
            python-version: "3.10"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
            interpreter: "/opt/python/cp310-cp310/bin/python"
          - os: ubuntu-latest
            python-version: "3.11"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
            interpreter: "/opt/python/cp311-cp311/bin/python"
          - os: ubuntu-latest
            python-version: "3.12"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
            interpreter: "/opt/python/cp312-cp312/bin/python"
          - os: ubuntu-latest
            python-version: "3.13"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
            interpreter: "/opt/python/cp313-cp313/bin/python"
          - os: ubuntu-latest
            python-version: "3.14"
            manylinux: "2_28"
            duckdb_explicit_platform: "linux_amd64"
            interpreter: "/opt/python/cp314-cp314/bin/python"
          - os: windows-latest
            python-version: "3.9"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: windows-latest
            python-version: "3.10"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: windows-latest
            python-version: "3.11"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: windows-latest
            python-version: "3.12"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: windows-latest
            python-version: "3.13"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: windows-latest
            python-version: "3.14"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: macos-14
            python-version: "3.9"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: macos-14
            python-version: "3.10"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: macos-14
            python-version: "3.11"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: macos-14
            python-version: "3.12"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: macos-14
            python-version: "3.13"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
          - os: macos-14
            python-version: "3.14"
            manylinux: "auto"
            duckdb_explicit_platform: ""
            interpreter: "python"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        env:
          DUCKDB_EXPLICIT_PLATFORM: ${{ matrix.duckdb_explicit_platform }}
        with:
          command: build
          args: --manifest-path python/Cargo.toml --release --out dist -i ${{ matrix.interpreter }}
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path python/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: [test-rust-default, test-rust-postgis, test-python, test-python-postgis-smoke, build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/freestiler
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
